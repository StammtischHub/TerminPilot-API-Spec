name: Cleanup Preview Packages

on:
  pull_request:
    types:
      - closed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - uses: actions/github-script@v9
        name: Cleanup preview packages from closed/merged PR
        with:
          script: |
            const prNumber = context.issue.number;
            const suffix = `-pr.${prNumber}.`;
            
            // npm Package Versionen löschen
            const npmVersions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
              package_type: 'npm',
              package_name: 'terminpilot-api-spec',
              org: context.repo.owner,
            });
            
            for (const version of npmVersions.data) {
              if (version.name.includes(suffix)) {
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'npm',
                  package_name: 'terminpilot-api-spec',
                  org: context.repo.owner,
                  package_version_id: version.id,
                });
                console.log(`Deleted npm: ${version.name}`);
              }
            }
            
            // Maven Package Versionen löschen
            const mavenVersions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
              package_type: 'maven',
              package_name: 'de.stammtischhub.terminpilot-api-spec',
              org: context.repo.owner,
            });
            
            for (const version of mavenVersions.data) {
              if (version.name.includes(suffix)) {
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'maven',
                  package_name: 'de.stammtischhub.terminpilot-api-spec',
                  org: context.repo.owner,
                  package_version_id: version.id,
                });
                console.log(`Deleted maven: ${version.name}`);
              }
            }
            
            console.log(`Cleanup done for PR #${prNumber}`);