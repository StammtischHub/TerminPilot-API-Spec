name: Publish Release Package

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.version-check.outputs.skip }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if version already published
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if git ls-remote --tags origin "v$VERSION" | grep -q "v$VERSION"; then
            echo "Tag v$VERSION existiert bereits, überspringe..."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Neue Version ohne Tag gefunden: v$VERSION"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  publish-release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - run: pnpm install --frozen-lockfile

      - name: Publish npm release package
        run: pnpm run publish:release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/maven-deploy

      - name: Create Git tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v$VERSION"
          git push origin "v$VERSION"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Release packages published"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "mvn package version:  de.stammtischhub:terminpilot-api-spec:$VERSION@yaml"
          echo "npm package version:  @stammtischhub/terminpilot-api-spec@$VERSION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
