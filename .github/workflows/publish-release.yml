name: Publish Release Package

on:
  push:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.version-check.outputs.skip }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if version is already published
        id: version-check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if git ls-remote --tags origin "v$VERSION" | grep -q "v$VERSION"; then
            echo "Tag v$VERSION existiert bereits, überspringe..."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Neue Version ohne Tag gefunden: v$VERSION"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  publish-release:
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.skip == 'false'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - run: pnpm install --frozen-lockfile
        name: Install dependencies

      - name: Publish npm release package
        run: pnpm run publish:release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/maven-deploy
        name: Publish Maven release package
        with:
          file: dist/openapi.bundled.yaml
          pom-file: .github/maven/maven-deploy-pom.xml
          url: https://maven.pkg.github.com/StammtischHub/TerminPilot-API-Spec
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-actor: ${{ github.actor }}

      - name: Create Git tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        uses: actions/github-script@v9
        with:
          script: |
            const version = require('./package.json').version;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `v${version}`,
              body: `Release v${version}`,
              draft: false,
              prerelease: false,
            });

      - uses: ./.github/actions/print-package-info
        name: Print package info to github step summary
        with:
          package_version: ${{ env.RELEASE_VERSION }}
