name: Publish Preview Package

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for relevant changes without version bump
        run: |
          VERSION_MAIN=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null)
          VERSION_BRANCH=$(node -p "require('./package.json').version")
          
          echo "Version on main:   $VERSION_MAIN"
          echo "Version on branch: $VERSION_BRANCH"
          
          if [ "$VERSION_MAIN" = "$VERSION_BRANCH" ]; then
            CHANGED=$(git diff origin/main...HEAD -- src/ | head -1)
          
            if [ -n "$CHANGED" ]; then
              echo "⚠️  Api Relevant files have changed, but the version in package.json is still $VERSION_BRANCH"
              echo "Please execute 'pnpm version patch/minor/major' to bump the version."
              exit 1
            else
              echo "✅ No api relevant files have changed, skipping version bump check."
            fi
          else
            echo "✅ Version was bumped from $VERSION_MAIN to $VERSION_BRANCH."
          fi

  publish-preview:
    runs-on: ubuntu-latest
    needs: check-version-bump
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - run: pnpm install --frozen-lockfile

      - name: Set preview version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PREVIEW_VERSION="${BASE_VERSION}-pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          pnpm version $PREVIEW_VERSION --no-git-tag-version
          echo "PREVIEW_VERSION=$PREVIEW_VERSION" >> $GITHUB_ENV

      - name: Debug Maven settings
        run: |
          echo "GITHUB_ACTOR: $GITHUB_ACTOR"
          echo "GITHUB_TOKEN is set: $([ -n "$GITHUB_TOKEN" ] && echo 'yes' || echo 'no')"
          mvn help:effective-settings -s .github/maven/maven-settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Publish preview packages
        run: pnpm run publish:all:preview
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          MAVEN_POM: ${{ github.workspace }}/.github/maven-deploy.xml

      - name: Print preview package info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Preview packages published"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "mvn package version:  de.stammtischhub:terminpilot-api-spec:${{ env.PREVIEW_VERSION }}@yaml"
          echo "npm package version:  @stammtischhub/terminpilot-api-spec@${{ env.PREVIEW_VERSION }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"