name: Publish Preview Package

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  check-relevant-changes:
    runs-on: ubuntu-latest
    outputs:
      relevant_changes: ${{ steps.check.outputs.relevant_changes }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if relevant files have changed compared to main
        id: check
        run: |
          CHANGED=$(git diff origin/main...HEAD -- src/ | head -1)
          if [ -n "$CHANGED" ]; then
            echo "relevant_changes=true" >> $GITHUB_OUTPUT
          else
            echo "relevant_changes=false" >> $GITHUB_OUTPUT
          fi

  check-version-bump:
    runs-on: ubuntu-latest
    needs: check-relevant-changes
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for missing version bump on relevant changes
        run: |
          if [ "${{ needs.check-relevant-changes.outputs.relevant_changes }}" = "false" ]; then
            echo "✅ No api relevant files have changed, skipping version bump check."
            exit 0
          fi

          VERSION_MAIN=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null)
          VERSION_BRANCH=$(node -p "require('./package.json').version")

          echo "Version on main:   $VERSION_MAIN"
          echo "Version on branch: $VERSION_BRANCH"

          if [ "$VERSION_MAIN" = "$VERSION_BRANCH" ]; then
            echo "⚠️ Api relevant files have changed, but the version in package.json is still $VERSION_BRANCH"
            echo "Please execute 'pnpm version patch/minor/major' to bump the version."
            exit 1
          else
            echo "✅ Version was bumped from $VERSION_MAIN to $VERSION_BRANCH."
          fi

  lint-api-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - run: pnpm validate
        name: Lint API spec

  publish-preview:
    runs-on: ubuntu-latest
    needs:
      - check-relevant-changes
      - lint-api-spec
    if: needs.check-relevant-changes.outputs.relevant_changes == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - run: pnpm install --frozen-lockfile
        name: Install dependencies

      - name: Set preview version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PREVIEW_VERSION="${BASE_VERSION}-pr.${{ github.event.pull_request.number }}.${SHORT_SHA}"
          pnpm version $PREVIEW_VERSION --no-git-tag-version
          echo "PREVIEW_VERSION=$PREVIEW_VERSION" >> $GITHUB_ENV

      - name: Publish npm preview package
        run: pnpm run publish:preview
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/maven-deploy
        name: Publish Maven preview package
        with:
          file: ${{ github.workspace }}/dist/openapi.bundled.yaml
          pom-file: ${{ github.workspace }}/.github/maven/maven-deploy-pom.xml
          url: https://maven.pkg.github.com/StammtischHub/TerminPilot-API-Spec
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-actor: ${{ github.actor }}

      - uses: ./.github/actions/print-package-info
        name: Print package info to github step summary
        with:
          package_version: ${{ env.PREVIEW_VERSION }}