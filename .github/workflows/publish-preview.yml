name: Publish Preview Package

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'

      - run: pnpm install --frozen-lockfile

      - name: Set preview version
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-10)
          PREVIEW_VERSION="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          npm version $PREVIEW_VERSION --no-git-tag-version
          echo "PREVIEW_VERSION=$PREVIEW_VERSION" >> $GITHUB_ENV

      - run: pnpm publish --tag preview --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print preview package info
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Preview Package published"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version:  @stammtischhub/terminpilot-api-spec@${{ env.PREVIEW_VERSION }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"