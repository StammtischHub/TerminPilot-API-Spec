get:
  tags:
    - Calendar
  summary: Get a user's calendar events
  description: >
    Returns all appointments for the given user for the time span from now
    until one month in the future.
  operationId: getEvents
  parameters:
    - $ref: '../components/parameters/UserId.yaml'
  responses:
    '200':
      description: List of calendar events within the requested time span
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../components/schemas/CalendarEvent.yaml'
    '400':
      description: Invalid request parameters