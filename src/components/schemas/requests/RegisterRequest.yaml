description: Registration request
type: object
required:
  - username
  - password
properties:
  username:
    type: string
    minLength: 3
    maxLength: 30
    pattern: '^[a-zA-Z0-9._-]+$'
    description: The desired username
  password:
    type: string
    format: password
    minLength: 8
    description: The user's password (plain text, protected by TLS)
