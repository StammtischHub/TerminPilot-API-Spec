openapi: 3.1.2
info:
  title: TerminPilot API
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: Local Development

tags:
  - name: Auth
    description: Endpoints for authentication
  - name: User Groups
    description: Endpoints for managing user groups
  - name: Users
    description: Endpoints for managing users

paths:
  /api/auth/register:
    $ref: './paths/auth/register.yaml'

  /api/auth/login:
    $ref: './paths/auth/login.yaml'

  /api/auth/logout:
    $ref: './paths/auth/logout.yaml'

  /api/auth/me:
    $ref: './paths/auth/me.yaml'

  /api/user-groups:
    $ref: './paths/user-groups.yaml'

  /api/user-groups/{user-group-id}:
    $ref: './paths/user-groups/{user-group-id}.yaml'

  /api/users:
    $ref: './paths/users.yaml'

  /api/users/{user-id}/user-groups:
    $ref: './paths/users/{user-id}/user-groups.yaml'
